# WAHA — instancia de PRUEBA del motor de WhatsApp alternativo (no toca producción).
# WAHA trae dos engines: WEBJS (Chromium real, whatsapp-web.js — el más resistente al
# error 463 en fríos) y NOWEB (Baileys al día). El objetivo es el experimento del 463:
# levantar esto aparte, apuntar el backend de prueba con WA_ENGINE=waha y comparar
# entregas frío/caliente contra Evolution el mismo día con chips equivalentes.
#
#   docker compose -f docker-compose.waha.yml up -d
#   Dashboard para probar a mano: http://localhost:3001/dashboard  (API key abajo)
#
# Notas:
# - Core (esta imagen) alcanza para texto + acks + estado. Enviar/bajar MEDIA y varias
#   sesiones avanzadas son WAHA Plus (de pago): no hace falta para la prueba.
# - El backend se conecta con WAHA_BASE_URL/WAHA_API_KEY y WA_ENGINE=waha (.env).
services:
  waha:
    image: devlikeapro/waha:latest
    restart: unless-stopped
    ports:
      # Solo loopback por defecto: esta instancia de PRUEBA no debe quedar abierta a
      # internet (dashboard + API controlan sesiones de WhatsApp). Para acceder de afuera,
      # túnel SSH (-L 3009:localhost:3009) en vez de publicar a 0.0.0.0.
      # Configurable: en el VPS el 3001 ya lo usa prospeccion-api, ahí va WAHA_PORT=3009.
      - "127.0.0.1:${WAHA_PORT:-3001}:3000"
    environment:
      # Sin defaults débiles: hay que definir estas 3 en el .env o el arranque falla.
      - WAHA_API_KEY=${WAHA_API_KEY:?definí WAHA_API_KEY}
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USERNAME:-federico}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD:?definí WAHA_DASHBOARD_PASSWORD}
      # Engine por defecto de las sesiones nuevas: WEBJS (opción 1) o NOWEB (opción 2).
      # El backend también lo manda por sesión (config.engine, env WAHA_ENGINE).
      - WHATSAPP_DEFAULT_ENGINE=${WAHA_ENGINE:-WEBJS}
      # Store de mensajes de NOWEB: sin esto, GET /api/messages (para leer los acks a
      # demanda) no funciona con el engine NOWEB. Para WEBJS es inocuo.
      - WHATSAPP_NOWEB_STORE_ENABLED=true
      - WHATSAPP_NOWEB_STORE_FULLSYNC=false
      # Webhook global de respaldo (el backend además configura webhooks por sesión).
      # message.any incluye los fromMe del teléfono (espejo al CRM); message.ack = tildes/463.
      # En el VPS de prueba se puede apuntar a un blackhole (los acks se leen por API).
      - WHATSAPP_HOOK_URL=${WAHA_WEBHOOK_URL:-http://host.docker.internal:4000/api/wa/webhook}
      - WHATSAPP_HOOK_EVENTS=message.any,message.ack,session.status
    volumes:
      - waha-sessions:/app/.sessions # persiste sesiones (evita re-escanear)

volumes:
  waha-sessions:
