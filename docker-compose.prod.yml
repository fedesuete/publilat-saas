# Stack de PRODUCCIÓN de Publi.lat: app (API + panel) + Postgres + Redis + Evolution.
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Antes: copiá .env.prod.example a .env y completá los valores (sobre todo JWT_SECRET,
# META_*, dominio APP_BASE_URL/PANEL_BASE_URL, y las claves de las pasarelas si las usás).

services:
  app:
    build:
      context: .
      args:
        # Mismo origen: el panel pega al backend que lo sirve. Si servís el panel en otro
        # dominio (CDN), poné acá la URL pública del backend.
        VITE_API_URL: ""
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/publilat?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?defini JWT_SECRET en .env}
      APP_BASE_URL: ${APP_BASE_URL:?defini APP_BASE_URL}
      PANEL_BASE_URL: ${PANEL_BASE_URL:?defini PANEL_BASE_URL}
      META_PIXEL_ID: ${META_PIXEL_ID:-}
      META_CAPI_TOKEN: ${META_CAPI_TOKEN:-}
      META_TEST_EVENT_CODE: ${META_TEST_EVENT_CODE:-}
      META_EVENT_SOURCE_URL: ${META_EVENT_SOURCE_URL:-}
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-publilat-dev-key-cambiame}
      EVOLUTION_WEBHOOK_URL: http://app:4000/api/wa/webhook?token=${EVOLUTION_WEBHOOK_TOKEN:-}
      EVOLUTION_WEBHOOK_TOKEN: ${EVOLUTION_WEBHOOK_TOKEN:-}
      # Pagos / S3 (opcionales)
      PRICE_PER_DAY_USD: ${PRICE_PER_DAY_USD:-1}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      MP_CURRENCY: ${MP_CURRENCY:-ARS}
      MP_PRICE_PER_DAY: ${MP_PRICE_PER_DAY:-1000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      NOWPAYMENTS_API_KEY: ${NOWPAYMENTS_API_KEY:-}
      NOWPAYMENTS_IPN_SECRET: ${NOWPAYMENTS_IPN_SECRET:-}
      NOWPAYMENTS_PAY_CURRENCY: ${NOWPAYMENTS_PAY_CURRENCY:-usdttrc20}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      CLOUDFRONT_DOMAIN: ${CLOUDFRONT_DOMAIN:-}
    # Sólo accesible localmente en el VPS; Caddy lo expone con HTTPS al exterior.
    ports:
      - "127.0.0.1:4000:4000"

  # Reverse proxy con HTTPS automático (Let's Encrypt).
  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?defini APP_DOMAIN en .env (ej: app.tudominio.com)}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redisdata:/data

  # OJO: este compose está DESACTUALIZADO respecto del deploy real (docker-compose.vps.yml).
  # v2.1.1 no manda el tctoken -> error 463 en envíos a pares fríos. Producción corre
  # evoapicloud/evolution-api:2.4.0-rc2 (requiere licencia community gratis + backup de DB).
  evolution-api:
    image: atendai/evolution-api:v2.1.1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=${EVOLUTION_SERVER_URL:-http://localhost:8080}
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-publilat-dev-key-cambiame}
      - CONFIG_SESSION_PHONE_VERSION=${CONFIG_SESSION_PHONE_VERSION:-2.3000.1042991638}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/evolution?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_LOCAL_ENABLED=false
      - DEL_INSTANCE=false
      - QRCODE_LIMIT=30
    volumes:
      - evolution_instances:/evolution/instances

volumes:
  pgdata:
  redisdata:
  evolution_instances:
  caddy_data:
  caddy_config:
