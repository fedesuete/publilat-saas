# Deploy en el VPS (Hostinger) que YA tiene EasyPanel + Traefik en 80/443.
# No usa Caddy: la app se publica en el puerto 4010 del host y el Traefik existente la
# rutea (ver /etc/easypanel/traefik/config/publilat.yaml). Aislado del resto de apps.
#   docker compose -f docker-compose.vps.yml up -d --build

services:
  app:
    build:
      context: .
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/publilat?schema=public
      REDIS_URL: redis://redis:6379
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_WEBHOOK_URL: http://app:4000/api/wa/webhook?token=${EVOLUTION_WEBHOOK_TOKEN}
      # Motor de WhatsApp: waha (WEBJS, actual) | evolution (rollback inmediato).
      WA_ENGINE: ${WA_ENGINE:-evolution}
      WAHA_BASE_URL: http://waha:3000
      # Pisa el WAHA_WEBHOOK_URL del .env (que apunta al blackhole de la instancia de
      # prueba): acá las sesiones se configuran con el webhook interno real.
      WAHA_WEBHOOK_URL: http://app:4000/api/wa/webhook?token=${EVOLUTION_WEBHOOK_TOKEN}
    ports:
      - "4010:4000" # Traefik -> http://IP:4010
    # Si el app queda colgado (no responde /health), autoheal lo reinicia solo (label abajo).
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    labels:
      autoheal: "true"

  # Vigila los contenedores con label autoheal=true y reinicia los que queden "unhealthy".
  # Solo toca los NUESTROS (label), no las apps del socio (n8n/prospeccion).
  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: "30"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  landing:
    build:
      context: .
      dockerfile: Dockerfile.landing
    restart: unless-stopped
    ports:
      - "4020:80" # Traefik -> http://IP:4020 (publi.lat / www.publi.lat)

  # PWA del jugador (Chat App) en su propio origen chat.publi.lat -> aísla el service worker.
  # Estático (nginx), sin estado. VITE_API_URL apunta a la API del panel. NO toca WhatsApp.
  chat-pwa:
    build:
      context: .
      dockerfile: Dockerfile.chat-pwa
      args:
        VITE_API_URL: "https://app.publi.lat"
    restart: unless-stopped
    ports:
      - "4030:80" # Traefik -> http://IP:4030 (chat.publi.lat)

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redisdata:/data

  evolution:
    # v2.4 (Baileys con tctoken): los envíos vuelven a entregar (el v2.3.7 daba error 463
    # en pares nuevos). Requiere licencia community (GRATIS) activada: ya activada el
    # 04/07/2026 desde el Manager (persiste en la DB). Si alguna vez pide LICENSE_REQUIRED
    # de nuevo: exponer 8085:8080 temporal y activar en /manager.
    # OJO: NO volver al tag "homolog" (build v2.4.0-170 del 04/07): /instance/create está
    # ROTO ahí (400 PrismaClientValidationError, incidente 09/07/2026). rc2 crea OK.
    # Tampoco downgradear a la ligera: rc2 no lee sesiones escritas por otro build
    # (las líneas caen a pedir QR). Cambiar de imagen SOLO con backup de la DB evolution.
    image: evoapicloud/evolution-api:2.4.0-rc2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - SERVER_URL=http://evolution:8080
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      # OJO: las versiones de WhatsApp Web EXPIRAN (~2 meses). Una versión vencida hace
      # que la sesión conecte y RECIBA pero los envíos se descarten en silencio.
      # Versión vigente: https://raw.githubusercontent.com/wppconnect-team/wa-version/main/versions.json
      # (campo currentVersion, sin el sufijo -alpha). Actualizarla en el .env del VPS.
      # El backend la vigila (job wa-version-check) y avisa al admin cuando hay que renovarla.
      - CONFIG_SESSION_PHONE_VERSION=${CONFIG_SESSION_PHONE_VERSION:-2.3000.1042991638}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_publilat
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      - CACHE_REDIS_PREFIX_KEY=evolution_publilat
      - CACHE_LOCAL_ENABLED=false
      - DEL_INSTANCE=false
      - QRCODE_LIMIT=30
    volumes:
      - evolution_instances:/evolution/instances

  # Motor de WhatsApp ACTUAL (WA_ENGINE=waha): WAHA con engine WEBJS (whatsapp-web.js,
  # Chromium real -> manda el tctoken y resuelve el 463 en fríos). Desde 2026.6.1 la
  # imagen Core es gratis con media incluida. Sin puerto público: el backend le pega por
  # la red interna y los clientes pasan por el panel. OJO: WEBJS corre un Chromium por
  # línea (más RAM/CPU que Baileys) — monitorear memoria al sumar líneas.
  waha:
    image: devlikeapro/waha:latest
    restart: unless-stopped
    environment:
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USERNAME:-admin}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD:-cambia-esta-clave}
      - WHATSAPP_DEFAULT_ENGINE=${WAHA_ENGINE:-WEBJS}
      # Webhook global de respaldo (el backend además configura webhooks por sesión).
      - WHATSAPP_HOOK_URL=http://app:4000/api/wa/webhook?token=${EVOLUTION_WEBHOOK_TOKEN}
      - WHATSAPP_HOOK_EVENTS=message.any,message.ack,session.status
      # Las URLs de media del webhook se generan con este hostname (resoluble por `app`).
      - WHATSAPP_API_HOSTNAME=waha
      - WHATSAPP_NOWEB_STORE_ENABLED=true
      - WHATSAPP_NOWEB_STORE_FULLSYNC=false
    volumes:
      - waha_sessions:/app/.sessions # persiste sesiones (evita re-escanear en cada deploy)
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/ping').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  pgdata:
  redisdata:
  evolution_instances:
  waha_sessions:
