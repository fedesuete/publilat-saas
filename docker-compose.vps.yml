# Deploy en el VPS (Hostinger) que YA tiene EasyPanel + Traefik en 80/443.
# No usa Caddy: la app se publica en el puerto 4010 del host y el Traefik existente la
# rutea (ver /etc/easypanel/traefik/config/publilat.yaml). Aislado del resto de apps.
#   docker compose -f docker-compose.vps.yml up -d --build

services:
  app:
    build:
      context: .
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/publilat?schema=public
      REDIS_URL: redis://redis:6379
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_WEBHOOK_URL: http://app:4000/api/wa/webhook?token=${EVOLUTION_WEBHOOK_TOKEN}
    ports:
      - "4010:4000" # Traefik -> http://IP:4010

  landing:
    build:
      context: .
      dockerfile: Dockerfile.landing
    restart: unless-stopped
    ports:
      - "4020:80" # Traefik -> http://IP:4020 (publi.lat / www.publi.lat)

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redisdata:/data

  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - SERVER_URL=http://evolution:8080
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - CONFIG_SESSION_PHONE_VERSION=${CONFIG_SESSION_PHONE_VERSION:-2.3000.1035194821}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_publilat
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      - CACHE_REDIS_PREFIX_KEY=evolution_publilat
      - CACHE_LOCAL_ENABLED=false
      - DEL_INSTANCE=false
      - QRCODE_LIMIT=30
    volumes:
      - evolution_instances:/evolution/instances

volumes:
  pgdata:
  redisdata:
  evolution_instances:
