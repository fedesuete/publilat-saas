name: Uptime monitor

# Monitoreo EXTERNO: corre en la infra de GitHub (no en el VPS), así detecta cuando el servidor
# está inalcanzable desde afuera (justo lo que pasó con el incidente de Hostinger). Si algún sitio
# no responde 200, el job FALLA -> GitHub te manda un email (si tenés las notificaciones de Actions
# activadas). Además, si cargás los secrets TELEGRAM_BOT_TOKEN y TELEGRAM_CHAT_ID, te avisa por
# Telegram al instante.
on:
  schedule:
    - cron: "*/5 * * * *" # cada 5 minutos (mínimo que permite GitHub)
  workflow_dispatch: {} # permite correrlo a mano desde la pestaña Actions

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Chequear sitios
        id: check
        run: |
          set +e
          SITES="https://app.publi.lat/health https://chat.publi.lat/ https://publi.lat/"
          DOWN=""
          for url in $SITES; do
            # 3 reintentos con 5s: ignora blips transitorios, agarra caídas reales.
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 --retry 3 --retry-delay 5 --retry-all-errors "$url")
            echo "$url -> $code"
            if [ "$code" != "200" ]; then DOWN="$DOWN $url($code)"; fi
          done
          if [ -n "$DOWN" ]; then
            echo "down=$DOWN" >> "$GITHUB_OUTPUT"
            echo "::error::CAÍDO:$DOWN"
          fi

      - name: Avisar por Telegram (si está configurado)
        if: steps.check.outputs.down != '' && env.TG_TOKEN != ''
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="🔴 Publi.lat CAÍDO:${{ steps.check.outputs.down }} — revisá statuspage.hostinger.com y el VPS." >/dev/null || true

      - name: Fallar el job si hay algo caído (dispara el email de GitHub)
        if: steps.check.outputs.down != ''
        run: |
          echo "Sitios caídos:${{ steps.check.outputs.down }}"
          exit 1
