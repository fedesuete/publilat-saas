server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # El service worker y el HTML NUNCA se cachean: así las actualizaciones de la PWA
  # llegan al toque (si el proxy cachea sw.js, los clientes quedan pegados a una versión vieja).
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  # Assets con hash en el nombre -> cache largo e inmutable.
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # Fallback SPA: /i/:code, /login, /chat son rutas del cliente -> siempre index.html.
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
  }

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
}
