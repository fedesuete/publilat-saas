http:
  routers:
    # Panel / app (app.publi.lat) -> contenedor app en :4010
    publilat:
      rule: "Host(`app.publi.lat`)"
      service: publilat
      entryPoints:
        - https
      tls:
        certResolver: letsencrypt
    publilat-http:
      rule: "Host(`app.publi.lat`)"
      service: publilat
      entryPoints:
        - http
      middlewares:
        - publilat-redirect

    # Landing de marketing (publi.lat + www) -> contenedor landing en :4020
    publilat-landing:
      rule: "Host(`publi.lat`) || Host(`www.publi.lat`)"
      service: publilat-landing
      entryPoints:
        - https
      tls:
        certResolver: letsencrypt
    publilat-landing-http:
      rule: "Host(`publi.lat`) || Host(`www.publi.lat`)"
      service: publilat-landing
      entryPoints:
        - http
      middlewares:
        - publilat-redirect

    # PWA del jugador (Chat App, chat.publi.lat) -> contenedor chat-pwa en :4030
    publilat-chat:
      rule: "Host(`chat.publi.lat`)"
      service: publilat-chat
      entryPoints:
        - https
      tls:
        certResolver: letsencrypt
    publilat-chat-http:
      rule: "Host(`chat.publi.lat`)"
      service: publilat-chat
      entryPoints:
        - http
      middlewares:
        - publilat-redirect

  services:
    publilat:
      loadBalancer:
        servers:
          - url: "http://187.77.33.164:4010"
    publilat-landing:
      loadBalancer:
        servers:
          - url: "http://187.77.33.164:4020"
    publilat-chat:
      loadBalancer:
        servers:
          - url: "http://187.77.33.164:4030"

  middlewares:
    publilat-redirect:
      redirectScheme:
        scheme: https
        permanent: true
